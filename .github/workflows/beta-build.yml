name: Build Beta Package

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*"
  workflow_dispatch:

concurrency:
  group: beta-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build beta ZIP artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install npm dependencies
        run: npm ci

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-dev

      - name: Build plugin
        run: npm run build

      - name: Generate readme.txt from README.md
        run: |
          cp README.md readme.txt
          sed -i 's/[ \t]*$//' readme.txt
          sed -i 's/^# \(.*\)/=== \1 ===/' readme.txt
          sed -i 's/^## \(.*\)/== \1 ==/' readme.txt
          sed -i 's/^### \(.*\)/= \1 =/' readme.txt
          sed -i 's/^\*\*Contributors:\*\* \(.*\)/Contributors: \1/' readme.txt
          sed -i 's/^\*\*Tags:\*\* \(.*\)/Tags: \1/' readme.txt
          sed -i 's/^\*\*Tested up to:\*\* \(.*\)/Tested up to: \1/' readme.txt
          sed -i 's/^\*\*Stable tag:\*\* \(.*\)/Stable tag: \1/' readme.txt
          sed -i 's/^\*\*Requires at least:\*\* \(.*\)/Requires at least: \1/' readme.txt
          sed -i 's/^\*\*Requires PHP:\*\* \(.*\)/Requires PHP: \1/' readme.txt
          sed -i 's/^\*\*License:\*\* \(.*\)/License: \1/' readme.txt
          sed -i 's/^\*\*License URI:\*\* \(.*\)/License URI: \1/' readme.txt

      - name: Build beta ZIP
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          package="photo-collage-beta-${short_sha}"

          mkdir -p _build/photo-collage
          grep -vE '^(#|$)' .distignore > .rsync_ignore
          rsync -rc --exclude-from=.rsync_ignore . _build/photo-collage/
          cd _build
          zip -r "../${package}.zip" photo-collage
          cd ..
          rm -rf _build .rsync_ignore

          echo "PACKAGE=${package}" >> "$GITHUB_ENV"

      - name: Upload beta artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}
          path: ${{ env.PACKAGE }}.zip
          if-no-files-found: error
          retention-days: 14
