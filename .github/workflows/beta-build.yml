name: Build Preview Package

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*"
  workflow_dispatch:

concurrency:
  group: beta-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build preview ZIP artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install npm dependencies
        run: npm ci

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-dev

      - name: Build plugin
        run: npm run build

      - name: Generate readme.txt from README.md
        run: bash .github/scripts/generate-readme-txt.sh README.md readme.txt

      - name: Build preview ZIP
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          package="photo-collage-preview-${short_sha}"
          bash .github/scripts/build-dist-zip.sh .distignore "${package}.zip"

          echo "PACKAGE=${package}" >> "$GITHUB_ENV"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}
          path: ${{ env.PACKAGE }}.zip
          if-no-files-found: error
          retention-days: 14
