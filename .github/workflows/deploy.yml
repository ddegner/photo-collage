name: Publish Release Packages

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install npm dependencies
        run: npm ci

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-dev

      - name: Validate release tag format
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          is_prerelease="${{ github.event.release.prerelease }}"
          semver_with_suffix='^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'
          semver_stable='^v?[0-9]+\.[0-9]+\.[0-9]+$'

          if [[ "${is_prerelease}" == "true" ]]; then
            if [[ ! "${tag}" =~ ${semver_with_suffix} ]]; then
              echo "Prerelease tags must be semver-like (for example: 0.5.15-beta.1)."
              echo "Received: ${tag}"
              exit 1
            fi
          else
            if [[ ! "${tag}" =~ ${semver_stable} ]]; then
              echo "Stable release tags must be x.y.z (optional leading v)."
              echo "Received: ${tag}"
              exit 1
            fi
          fi

      - name: Capture release version
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          echo "RELEASE_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Validate stable source version matches tag
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        run: |
          set -euo pipefail
          expected="${RELEASE_VERSION}"
          header_version="$(sed -n "s/^ \* Version:[[:space:]]*//p" photo-collage.php | head -n1 | xargs)"
          constant_version="$(sed -n "s/^define( 'PHOTO_COLLAGE_VERSION', '\([^']*\)' );/\1/p" photo-collage.php | head -n1)"

          if [[ "${header_version}" != "${expected}" ]]; then
            echo "Stable tag/version mismatch. Header version: ${header_version}, tag: ${expected}"
            exit 1
          fi

          if [[ "${constant_version}" != "${expected}" ]]; then
            echo "Stable tag/version mismatch. Constant version: ${constant_version}, tag: ${expected}"
            exit 1
          fi

      - name: Sync prerelease source version to tag
        if: ${{ github.event.release.prerelease || startsWith(github.event.release.tag_name, 'beta-') }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION}"
          sed -i -E "s/^( \* Version:[[:space:]]*).*/\\1${release_version}/" photo-collage.php
          sed -i -E "s/^define\\( 'PHOTO_COLLAGE_VERSION', '[^']*' \\);/define( 'PHOTO_COLLAGE_VERSION', '${release_version}' );/" photo-collage.php

      - name: Build plugin
        run: npm run build

      - name: Generate readme.txt from README.md
        run: bash .github/scripts/generate-readme-txt.sh README.md readme.txt

      - name: Build GitHub distribution ZIP
        run: bash .github/scripts/build-dist-zip.sh .distignore "photo-collage-${{ github.event.release.tag_name }}.zip"

      - name: Assert GitHub ZIP contents
        run: bash .github/scripts/assert-dist-split.sh "photo-collage-${{ github.event.release.tag_name }}.zip"

      - name: Prepare WordPress.org distignore
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        run: cp .distignore-wporg .distignore

      - name: Deploy to WordPress.org and generate ZIP
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        id: wporg
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: photo-collage

      - name: Rename WordPress.org ZIP for release asset
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        run: cp "${{ steps.wporg.outputs['zip-path'] }}" "photo-collage-wporg-${{ github.event.release.tag_name }}.zip"

      - name: Assert stable GitHub/wp.org ZIP split
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        run: bash .github/scripts/assert-dist-split.sh "photo-collage-${{ github.event.release.tag_name }}.zip" "photo-collage-wporg-${{ github.event.release.tag_name }}.zip"

      - name: Attach GitHub distribution ZIP to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: photo-collage-${{ github.event.release.tag_name }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach WordPress.org ZIP to stable release
        if: ${{ !github.event.release.prerelease && !startsWith(github.event.release.tag_name, 'beta-') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: photo-collage-wporg-${{ github.event.release.tag_name }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
